{{- if .Values.agent.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: crater-agent-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: crater-agent
type: Opaque
stringData:
  internal-token: {{ required "agent.internalToken is required when agent.enabled is true" .Values.agent.internalToken | quote }}
{{- end }}
