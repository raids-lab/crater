name: Agent Build

on:
  push:
    branches: [main]
    paths:
      - "crater-agent/**"
      - ".github/workflows/agent-build.yml"
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  REPOSITORY: raids-lab
  IMAGE_NAME: crater-agent

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crater-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crater-agent/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall -q crater_agent

      - name: Import smoke test
        run: python -c "import crater_agent.app; print('ok')"

  build-and-push-image:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: ./crater-agent
          file: ./crater-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - uses: quartx-analytics/ghcr-cleaner@v1
        with:
          owner-type: org
          token: ${{ secrets.PAT_TOKEN }}
          repository-owner: ${{ github.repository_owner }}
          package-name: ${{ env.IMAGE_NAME }}
          delete-untagged: true
          keep-at-most: 2
          skip-tags: v*
