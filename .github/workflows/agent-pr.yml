name: Agent PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - "crater-agent/**"
      - ".github/workflows/agent-pr.yml"

jobs:
  agent-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crater-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crater-agent/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall -q crater_agent

      - name: Import smoke test
        run: python -c "import crater_agent.app; print('ok')"

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./crater-agent
          file: ./crater-agent/Dockerfile
          push: false
          tags: crater-agent:test
