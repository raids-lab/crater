name: Validate Helm Chart

on:
  pull_request:
    paths:
      - "charts/**"

jobs:
  validate-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Validate Chart Syntax
        run: |
          cd charts
          helm lint crater/
          helm template crater crater/ --dry-run

      - name: Check Chart Version Update
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "Base branch: $BASE_BRANCH"
          git fetch origin "$BASE_BRANCH:refs/remotes/origin/$BASE_BRANCH"
          bash charts/hack/check-chart-version.sh --base "origin/$BASE_BRANCH"

      - name: Package Chart (Test)
        run: |
          cd charts
          # 先通过 lint 校验 Chart 合法性（语法、依赖、模板等）
          helm lint crater/ 
          # 再执行打包（可选保留或删除文件）
          helm package crater/
          echo "✅ Chart packaging test completed successfully"
          # 可选：删除打包文件（仅测试用，不保留）
          rm -f crater-*.tgz
