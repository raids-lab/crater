name: Crater Agent PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - "crater-agent/**"
      - ".github/workflows/crater-agent-pr.yml"

jobs:
  crater-agent-lint-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crater-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "crater-agent/pyproject.toml"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check src

  crater-agent-compile-check:
    runs-on: ubuntu-latest
    needs: crater-agent-lint-check
    defaults:
      run:
        working-directory: crater-agent
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m compileall -q src
