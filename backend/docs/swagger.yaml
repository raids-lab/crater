info:
  contact: {}
  description: This is the API server for Crater, a Multi-tenant AI Model Training
    Platform based on Kubernetes.
  title: Crater API
  version: 1.0.0
paths:
  /admin/nodes/{name}/pods:
    get:
      consumes:
      - application/json
      description: 获取节点Pod信息，包含作业和用户信息
      parameters:
      - description: 节点名称
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回值描述
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-array_github_com_raids-lab_crater_pkg_crclient_Pod'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: 其他错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: 获取节点Pod信息（管理员）
      tags:
      - Node
  /api/v1/admin/aiops/chat:
    post:
      consumes:
      - application/json
      description: Chat with AIOps assistant in rule-based mode, optionally with a
        target job.
      parameters:
      - description: Chat request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_ChatResponse'
      summary: Rule-based chat for AIOps
      tags:
      - aiops
  /api/v1/admin/aiops/diagnose/{jobName}:
    get:
      description: Run rule-based diagnosis for a job by jobName.
      parameters:
      - description: Job name
        in: path
        name: jobName
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_DiagnosisResp'
      summary: Diagnose a job
      tags:
      - aiops
  /api/v1/admin/aiops/health-overview:
    get:
      description: Get job health overview for all users. days=0 means all time.
      parameters:
      - description: Lookback days (default 7, 0 means all time)
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_HealthOverviewResp'
      summary: Get AIOps health overview (admin)
      tags:
      - aiops
  /api/v1/admin/aiops/llmchat:
    post:
      consumes:
      - application/json
      description: Chat with AIOps assistant in LLM mode, optionally with a target
        job context.
      parameters:
      - description: Chat request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_ChatResponse'
      summary: LLM chat for AIOps
      tags:
      - aiops
  /api/v1/admin/diagnostics/failure-types/top:
    get:
      description: Get aggregated statistics of the most common failure types for
        all users' failed jobs.
      parameters:
      - description: Number of days to look back (-1 means all time)
        in: query
        name: days
        type: integer
      - description: Maximum number of failure types to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-array_internal_handler_FailureStat'
      summary: Get top failure types (admin)
      tags:
      - diagnostics
  /api/v1/aiops/chat:
    post:
      consumes:
      - application/json
      description: Chat with AIOps assistant in rule-based mode, optionally with a
        target job.
      parameters:
      - description: Chat request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_ChatResponse'
      summary: Rule-based chat for AIOps
      tags:
      - aiops
  /api/v1/aiops/diagnose/{jobName}:
    get:
      description: Run rule-based diagnosis for a job by jobName.
      parameters:
      - description: Job name
        in: path
        name: jobName
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_DiagnosisResp'
      summary: Diagnose a job
      tags:
      - aiops
  /api/v1/aiops/health-overview:
    get:
      description: Get job health overview for current user. days=0 means all time.
      parameters:
      - description: Lookback days (default 7, 0 means all time)
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_HealthOverviewResp'
      summary: Get AIOps health overview
      tags:
      - aiops
  /api/v1/aiops/llmchat:
    post:
      consumes:
      - application/json
      description: Chat with AIOps assistant in LLM mode, optionally with a target
        job context.
      parameters:
      - description: Chat request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.ChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_ChatResponse'
      summary: LLM chat for AIOps
      tags:
      - aiops
  /api/v1/diagnostics/context/{name}:
    get:
      description: Get job metadata, persisted diagnostics fields, and optional log
        tail for troubleshooting.
      parameters:
      - description: Job name
        in: path
        name: name
        required: true
        type: string
      - description: Whether to include pod log tail
        in: query
        name: includeLog
        type: boolean
      - description: Number of log lines to tail when includeLog=true
        in: query
        name: tailLines
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_JobContextResp'
      summary: Get diagnostic context by job name
      tags:
      - diagnostics
  /api/v1/diagnostics/failure-types/top:
    get:
      description: Get aggregated statistics of the most common failure types for
        current user's failed jobs.
      parameters:
      - description: Number of days to look back (-1 means all time)
        in: query
        name: days
        type: integer
      - description: Maximum number of failure types to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-array_internal_handler_FailureStat'
      summary: Get top failure types
      tags:
      - diagnostics
  /auth/check:
    get:
      consumes:
      - application/json
      description: 验证Authorization header中的Bearer token，返回用户信息、上下文和版本信息
      produces:
      - application/json
      responses:
        "200":
          description: token验证成功，返回用户信息、上下文和版本信息
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_CheckResp'
        "401":
          description: token无效或已过期
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: 验证用户token并返回用户信息
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: 校验用户身份，生成包含当前用户和项目的 JWT Token
      parameters:
      - description: 查询参数
        in: body
        name: data
        schema:
          $ref: '#/definitions/internal_handler.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回 JWT Token 和默认个人项目
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_LoginResp'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: 数据库交互错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      summary: 用户登录
      tags:
      - Auth
  /auth/mode:
    get:
      consumes:
      - application/json
      description: 返回后端部署的认证模式配置
      produces:
      - application/json
      responses:
        "200":
          description: 启用认证类型及注册配置
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_AuthModeResp'
        "500":
          description: 获取相关配置时错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      summary: 获取后端用户认证模式
      tags:
      - Auth
  /metrics:
    get:
      consumes:
      - application/json
      description: 返回Prometheus能够识别的信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回
          schema:
            items:
              $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
            type: array
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: 其他错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: 获取系统中每种Status的Job的数量
      tags:
      - Metrics
  /v1/accounts:
    get:
      consumes:
      - application/json
      description: Join user_account and account tables to get summary info of all
        user's accounts
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回值描述
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-array_internal_handler_AccountResp'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: 其他错误
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: Get all accounts for user
      tags:
      - Project
  /v1/accounts/{aid}/users:
    get:
      consumes:
      - application/json
      description: Get list of users in account (requires user to be in account)
      parameters:
      - description: aid
        in: path
        name: aid
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: User account entries
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "400":
          description: Request parameter error
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "403":
          description: Forbidden - user not in account
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: Other errors
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: Get users in account
      tags:
      - Project
  /v1/accounts/{aid}/users/{uid}:
    delete:
      consumes:
      - application/json
      description: Account admin removes user from account
      parameters:
      - description: uid
        in: path
        name: uid
        required: true
        type: integer
      - description: aid
        in: path
        name: aid
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Returns removed username and account name
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "400":
          description: Request parameter error
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "403":
          description: Forbidden - not account admin
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: Other errors
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: Remove user from account (account admin)
      tags:
      - Project
    post:
      consumes:
      - application/json
      description: Account admin adds user to account
      parameters:
      - description: uid
        in: path
        name: uid
        required: true
        type: integer
      - description: aid
        in: path
        name: aid
        required: true
        type: integer
      - description: Role and access mode
        in: body
        name: req
        required: true
        schema: {}
      produces:
      - application/json
      responses:
        "200":
          description: Returns added username and account name
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "400":
          description: Request parameter error
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "403":
          description: Forbidden - not account admin
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: Other errors
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: Add user to account (account admin)
      tags:
      - Project
    put:
      consumes:
      - application/json
      description: Account admin batch updates user-account relationship (partial
        update)
      parameters:
      - description: aid
        in: path
        name: aid
        required: true
        type: integer
      - description: uid
        in: path
        name: uid
        required: true
        type: integer
      - description: Update data
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/internal_handler.PutUserInProjectReq'
      produces:
      - application/json
      responses:
        "200":
          description: Update result
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-internal_handler_PutUserInProjectResp'
        "400":
          description: Request parameter error
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "403":
          description: Forbidden - not account admin
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
        "500":
          description: Other errors
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
      security:
      - Bearer: []
      summary: Batch update user-account relationship (account admin)
      tags:
      - Project
  /v1/accounts/{aid}/users/{uid}/update:
    post:
      consumes:
      - application/json
      description: Account admin updates user information in account
      parameters:
      - description: uid
        in: path
        name: uid
        required: true
        type: integer
      - description: aid
        in: path
        name: aid
        required: true
        type: integer
      - description: Role and access mode
        in: body
        name: req
        required: true
        schema: {}
      produces:
      - application/json
      responses:
        "200":
          description: Returns updated username and account name
          schema:
            $ref: '#/definitions/github_com_raids-lab_crater_internal_resputil.Response-any'
