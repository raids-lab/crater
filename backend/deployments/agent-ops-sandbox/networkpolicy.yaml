apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-ops-toolbox-default-deny
  namespace: crater-agent-ops
  labels:
    app.kubernetes.io/name: crater-agent-ops-sandbox
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: toolbox
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-ops-toolbox-allow-dns
  namespace: crater-agent-ops
  labels:
    app.kubernetes.io/name: crater-agent-ops-sandbox
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: toolbox
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-ops-toolbox-allow-kube-apiserver
  namespace: crater-agent-ops
  labels:
    app.kubernetes.io/name: crater-agent-ops-sandbox
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: toolbox
  policyTypes:
    - Egress
  egress:
    - to:
        # Replace with your cluster's Kubernetes API service IP/CIDR.
        # This default is a common kubeadm service CIDR example only.
        - ipBlock:
            cidr: 10.96.0.1/32
      ports:
        - protocol: TCP
          port: 443
