apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - networkpolicy.yaml
  - toolbox-job.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: agent-ops-script-catalog
    namespace: crater-agent-ops
    files:
      - scripts/runner.sh
      - scripts/inspect_pvc.sh
      - scripts/inspect_mounts.sh
      - scripts/collect_events.sh
      - scripts/inspect_rdma_node.sh
      - scripts/diagnose_nccl_job.sh
