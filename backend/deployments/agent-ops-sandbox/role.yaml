apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crater-agent-ops-sandbox
  namespace: crater-agent-ops
  labels:
    app.kubernetes.io/name: crater-agent-ops-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
