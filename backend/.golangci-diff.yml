version: "2"
linters:
  default: none
  enable:
    - forbidigo
    - staticcheck
  settings:
    forbidigo:
      forbid:
        # 1. 禁止原生的错误构造函数
        - pattern: ^fmt\.Errorf$
          msg: "禁止直接使用 fmt.Errorf。请使用 bizerr.<Group>.<Code>.Wrap(err, msg) 或 .New(msg)"
        - pattern: ^errors\.New$
          msg: "禁止直接使用 errors.New。请使用 bizerr.<Group>.<Code>.New(msg)"
        
        # 2. 如果你引入了 pkg/errors (github.com/pkg/errors)，也建议禁用
        - pattern: ^errors\.Errorf$
          msg: "禁止使用 pkg/errors.Errorf。请使用 bizerr 体系"
        - pattern: ^errors\.Wrap(f)?$
          msg: "禁止使用 pkg/errors.Wrap。请使用 bizerr.<Group>.<Code>.Wrap"
      exclude-godoc-examples: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - forbidigo
        path: ^(internal/handler|service)/
      - linters:
          - staticcheck
        path: pkg/golinters/errcheck.go
        text: "SA1019: errCfg.Exclude is deprecated: use ExcludeFunctions instead"
      - linters:
          - staticcheck
        path: pkg/commands/run.go
        text: "SA1019: lsc.Errcheck.Exclude is deprecated: use ExcludeFunctions instead"
      - linters:
          - staticcheck
        path: pkg/commands/run.go
        text: "SA1019: c.cfg.Run.ShowStats is deprecated: use Output.ShowStats instead."
      - path: pkg/golinters/govet.go
        text: "SA1019: cfg.CheckShadowing is deprecated: the linter should be enabled inside `Enable`."
      - path: pkg/commands/config.go
        text: "SA1019: cfg.Run.UseDefaultSkipDirs is deprecated: use Issues.UseDefaultExcludeDirs instead."
      - linters:
          - staticcheck
        path: pkg/golinters/godot.go
        text: "SA1019: settings.CheckAll is deprecated: use `Scope` instead"
      - linters:
          - staticcheck
        path: pkg/golinters/gofumpt.go
        text: "SA1019: settings.LangVersion is deprecated: use the global `run.go` instead."
      - linters:
          - staticcheck
        path: pkg/golinters/staticcheck_common.go
        text: "SA1019: settings.GoVersion is deprecated: use the global `run.go` instead."
      - linters:
          - staticcheck
        path: pkg/lint/lintersdb/manager.go
        text: "SA1019: (.+).(GoVersion|LangVersion) is deprecated: use the global `run.go` instead."
    paths:
      - test/testdata_etc
      - internal/cache
      - internal/renameio
      - internal/robustio
      - third_party$
      - builtin$
      - examples$